server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed build assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA entry (index.html served here + for every client route) must never
    # be cached, or Telegram's WebView keeps serving a stale bundle after a
    # deploy. no-store forces a fresh fetch → latest hashed chunks load.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires off;
    }

    location = /push-sw.js {
        add_header Cache-Control "no-cache";
        expires off;
    }

    location /media/ {
        try_files $uri $uri/ =404;
    }
}


