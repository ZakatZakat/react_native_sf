# Production compose for citysignal.digital-assistant.tech
# All services attach to traefik-public; only the frontend, api, curator,
# and media paths get public Traefik routes (api+media share the apex domain
# under PathPrefix; curator gets a PathPrefix of its own).
services:
  app:
    build:
      context: .
      target: runner
      args:
        - VITE_API_URL=https://${DOMAIN}/api
        - VITE_CURATOR_URL=https://${DOMAIN}/curator
        - VITE_ANALYTICS_URL=https://analytics-platform.digital-assistant.tech/api/v1/events
        - VITE_ANALYTICS_TOKEN=${VITE_ANALYTICS_TOKEN}
        - VITE_ANALYTICS_SERVICE=citysignal
    env_file: [.env]
    working_dir: /app
    networks: [traefik-public]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.citysignal-frontend.loadbalancer.server.port=80
      - traefik.http.routers.citysignal-frontend-http.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.citysignal-frontend-http.entrypoints=http
      - traefik.http.routers.citysignal-frontend-http.middlewares=https-redirect
      - traefik.http.routers.citysignal-frontend-https.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.citysignal-frontend-https.entrypoints=https
      - traefik.http.routers.citysignal-frontend-https.tls=true
      - traefik.http.routers.citysignal-frontend-https.tls.certresolver=le

  telegram:
    build:
      context: ./services/telegram
    working_dir: /app
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_SESSION_STRING: ${TELEGRAM_SESSION_STRING}
      TELEGRAM_LOGIN_MODE: ${TELEGRAM_LOGIN_MODE}
    env_file: [.env]
    networks: [traefik-public]

  api:
    build: { context: ./backend }
    working_dir: /app
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_SESSION_STRING: ${TELEGRAM_SESSION_STRING}
      TELEGRAM_LOGIN_MODE: ${TELEGRAM_LOGIN_MODE}
      TELEGRAM_CHANNEL_IDS: ${TELEGRAM_CHANNEL_IDS}
      TELEGRAM_SERVICE_URL: ${TELEGRAM_SERVICE_URL}
      TELEGRAM_SERVICE_TOKEN: ${TELEGRAM_SERVICE_TOKEN}
      TELEGRAM_MEDIA_PUBLIC_URL: https://${DOMAIN}
      REDIS_URL: redis://redis:6379/0
      POSTGRES_DSN: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      BOT_POLLING_INTERVAL: ${BOT_POLLING_INTERVAL}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    env_file: [.env]
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      redis: { condition: service_started }
      db: { condition: service_healthy }
    networks: [traefik-public]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.citysignal-api.loadbalancer.server.port=8000
      - traefik.http.middlewares.citysignal-api-strip.stripprefix.prefixes=/api
      - traefik.http.routers.citysignal-api-https.rule=Host(`${DOMAIN}`) && PathPrefix(`/api`)
      - traefik.http.routers.citysignal-api-https.entrypoints=https
      - traefik.http.routers.citysignal-api-https.tls=true
      - traefik.http.routers.citysignal-api-https.tls.certresolver=le
      - traefik.http.routers.citysignal-api-https.middlewares=citysignal-api-strip
      - traefik.http.routers.citysignal-media-https.rule=Host(`${DOMAIN}`) && PathPrefix(`/media`)
      - traefik.http.routers.citysignal-media-https.entrypoints=https
      - traefik.http.routers.citysignal-media-https.tls=true
      - traefik.http.routers.citysignal-media-https.tls.certresolver=le

  curator:
    build: { context: ./services/curator }
    working_dir: /app
    environment:
      POSTGRES_DSN: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      CURATOR_SCHEMA: curator
      TELEGRAM_SERVICE_URL: ${TELEGRAM_SERVICE_URL}
      TELEGRAM_SERVICE_TOKEN: ${TELEGRAM_SERVICE_TOKEN}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      AUTH_DEV_MODE: ${AUTH_DEV_MODE:-true}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@digital-assistant.tech}
    env_file: [.env]
    depends_on:
      db: { condition: service_healthy }
    networks: [traefik-public]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.citysignal-curator.loadbalancer.server.port=8003
      - traefik.http.middlewares.citysignal-curator-strip.stripprefix.prefixes=/curator
      - traefik.http.routers.citysignal-curator-https.rule=Host(`${DOMAIN}`) && PathPrefix(`/curator`)
      - traefik.http.routers.citysignal-curator-https.entrypoints=https
      - traefik.http.routers.citysignal-curator-https.tls=true
      - traefik.http.routers.citysignal-curator-https.tls.certresolver=le
      - traefik.http.routers.citysignal-curator-https.middlewares=citysignal-curator-strip

  bot:
    build: { context: ./services/bot }
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_BOT_TOKEN: ${BOT_TELEGRAM_BOT_TOKEN}
      WEB_APP_URL: https://${DOMAIN}/
      SESSION_NAME: /var/lib/cs-bot/session
    env_file: [.env]
    restart: unless-stopped
    volumes:
      - cs_bot_session:/var/lib/cs-bot
    networks: [traefik-public]

  redis:
    image: redis:7
    networks: [traefik-public]

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      traefik-public:
        aliases: [tg-miniapp-db]

  media:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./deploy/media-nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - citysignal_media:/srv/media
    networks: [traefik-public]
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public
      - traefik.http.services.citysignal-media-nginx.loadbalancer.server.port=80
      - traefik.http.routers.citysignal-media-r.rule=Host(`${DOMAIN}`) && PathPrefix(`/media`)
      - traefik.http.routers.citysignal-media-r.entrypoints=https
      - traefik.http.routers.citysignal-media-r.tls=true
      - traefik.http.routers.citysignal-media-r.tls.certresolver=le
      - traefik.http.routers.citysignal-media-r.priority=100

networks:
  traefik-public:
    external: true


volumes:
  pgdata:
  citysignal_media:
  cs_bot_session:
