server {
    listen 80;
    server_name _;
    root /srv;

    # /media: локальные файлы → на промахе тянем с поллера И сохраняем к себе (зеркало)
    location /media/ {
        try_files $uri @poller;
        expires 7d;
        add_header Cache-Control "public";
    }
    location @poller {
        proxy_pass https://poller.city-signalll.xyz;
        proxy_ssl_server_name on;
        proxy_set_header Host poller.city-signalll.xyz;
        # Не зеркалить ошибки поллера. Без этого proxy_store сохранял 404/пустой
        # ответ как 0-байтный /srv/media/*.jpg, а try_files потом отдавал его
        # вечно как 200/0b → битая «?»-картинка в ленте. С intercept ошибочный
        # ответ уходит в @miss и на диск НЕ пишется (сохраняются только 200).
        proxy_intercept_errors on;
        error_page 400 403 404 500 502 503 504 = @miss;
        proxy_store /srv$uri;
        proxy_store_access user:rw group:rw all:r;
    }
    location @miss { return 404; }
    location = /media-health { return 200 "ok"; }
}
