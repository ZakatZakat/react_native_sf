<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Warm the connection to MapTiler early so the intro-map prewarm (loading screen) fetches tiles/glyphs faster. -->
    <link rel="preconnect" href="https://api.maptiler.com" crossorigin />
    <!-- Fonts (Inter + JetBrains Mono) are self-hosted via @fontsource (imported
         in main.tsx and bundled by Vite) — no Google-CDN links here, so the UI
         never falls back to Helvetica/SF when the Telegram webview blocks the CDN. -->

    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- user-scalable=no + maximum-scale=1: pinch-zoom must drive the MapLibre
         map, NOT browser page-zoom (which scaled the whole UI — cards included —
         in the Telegram mini-app webview). -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AI-Picks</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Telegram WebApp bridge -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
