<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Warm the connection to MapTiler early so the intro-map prewarm (loading screen) fetches tiles/glyphs faster. -->
    <link rel="preconnect" href="https://api.maptiler.com" crossorigin />
    <!-- Load the app fonts as early as possible (in <head>, not via CSS @import)
         so the cold-open's wordmark renders in Inter from the first frame
         instead of swapping from a system fallback mid-animation. -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI-Picks</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Telegram WebApp bridge -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
